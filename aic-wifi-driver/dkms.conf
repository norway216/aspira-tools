# AIC8800 USB WiFi Driver — DKMS Configuration
#
# Place this file and the source tree at /usr/src/aic8800-1.0.0/
# Then: dkms add /usr/src/aic8800-1.0.0
#       dkms build aic8800/1.0.0
#       dkms install aic8800/1.0.0

PACKAGE_NAME="aic8800"
PACKAGE_VERSION="1.0.0"

# Module to build
BUILT_MODULE_NAME[0]="aic8800_fdrv"
DEST_MODULE_LOCATION[0]="/kernel/drivers/net/wireless/aic8800"

# Firmware to include
FIRMWARE_DIR="/lib/firmware/aic8800"

# Auto-install on kernel update
AUTOINSTALL="yes"

# Build configuration
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"

# Clean
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

# Required kernel config
REMAKE_INITRD="yes"
