# System Recovery – Default Configuration
# This file is read at startup.  Values can be overridden via
# environment variables (see docs/architecture-design.md).

[display]
width = 1920
height = 1080

[input]
touchpad_sensitivity = 100
double_click_ms = 450
debug = false

[storage]
recovery_partition = /dev/mmcblk0p2
data_partition     = /dev/mmcblk0p7
root_a_partition   = /dev/mmcblk0p5
root_b_partition   = /dev/mmcblk0p6
root_a_mount       = /tmp/sr_roota
root_b_mount       = /tmp/sr_rootb
data_mount         = /tmp/sr_data
recovery_mount     = /tmp/sr_recovery

[recovery]
timeout_minutes = 20
verify_checksum = true

[paths]
update_script = /scripts/init-bottom/zz-jelina_flasher

[boot]
mode = auto
